<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Niju Kawaii — Elevando o kawaii a máxima potência</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Fredoka+One&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --black: #111111;
      --lavender: #a89fd8;
      --lavender-light: #c8c0f0;
      --pink: #f06a8a;
      --pink-light: #f7a8bc;
      --yellow: #f5d364;
      --yellow-light: #faeaa0;
      --blue: #7b85d4;
      --blue-light: #b0b8e8;
      --white: #fff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--lavender-light);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Floating paws background */
    .bg-paws {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .paw {
      position: absolute;
      font-size: 1.5rem;
      opacity: 0.13;
      animation: floatPaw linear infinite;
    }

    @keyframes floatPaw {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.13; }
      90%  { opacity: 0.13; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.5rem 3rem;
      gap: 0;
    }

    /* Decorative top bar */
    .top-bar {
      width: 100%;
      max-width: 480px;
      height: 10px;
      border-radius: 99px;
      background: linear-gradient(90deg,
        var(--yellow) 0%,
        var(--pink) 33%,
        var(--lavender) 66%,
        var(--blue) 100%
      );
      margin-bottom: 2.2rem;
      box-shadow: 0 4px 18px 0 rgba(160,120,200,0.25);
    }

    /* Hero card */
    .card {
      background: var(--white);
      border-radius: 2.5rem;
      box-shadow: 0 8px 48px 0 rgba(130,100,200,0.18), 0 2px 8px rgba(0,0,0,0.07);
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Logo */
    .logo-wrap {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      overflow: hidden;
      border: 5px solid var(--lavender);
      box-shadow: 0 4px 24px rgba(168,159,216,0.35);
      margin-bottom: 1.1rem;
      background: var(--lavender-light);
      animation: popIn 0.7s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn {
      0%   { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }
    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Brand name */
    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 2.6rem;
      color: var(--black);
      letter-spacing: 2px;
      line-height: 1;
      margin-bottom: 0.3rem;
      animation: slideUp 0.6s 0.2s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes slideUp {
      0%   { transform: translateY(20px); opacity: 0; }
      100% { transform: translateY(0);    opacity: 1; }
    }

    /* Slogan */
    .slogan {
      font-size: 0.95rem;
      color: var(--lavender);
      font-weight: 700;
      text-align: center;
      margin-bottom: 1.8rem;
      letter-spacing: 0.3px;
      animation: slideUp 0.6s 0.35s cubic-bezier(.34,1.56,.64,1) both;
    }

    /* Section label */
    .section-label {
      font-size: 0.8rem;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 1rem;
      animation: slideUp 0.6s 0.45s both;
    }

    /* Marketplace buttons */
    .stores {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      width: 100%;
    }

    .store-btn {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.9rem 1.3rem;
      border-radius: 1.3rem;
      text-decoration: none;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1.05rem;
      transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s;
      position: relative;
      overflow: hidden;
    }
    .store-btn::after {
      content: '→';
      position: absolute;
      right: 1.2rem;
      font-size: 1.1rem;
      transition: right 0.2s;
    }
    .store-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 8px 28px rgba(0,0,0,0.13);
    }
    .store-btn:hover::after {
      right: 0.8rem;
    }
    .store-btn:active {
      transform: scale(0.97);
    }

    .btn-shopee {
      background: linear-gradient(135deg, #ff6533 0%, #ff8c5a 100%);
      color: #fff;
      animation: slideUp 0.5s 0.55s both;
      box-shadow: 0 4px 16px rgba(255,101,51,0.25);
    }
    .btn-ml {
      background: linear-gradient(135deg, #ffe600 0%, #ffcc00 100%);
      color: #333;
      animation: slideUp 0.5s 0.65s both;
      box-shadow: 0 4px 16px rgba(255,200,0,0.25);
    }
    .btn-tiktok {
      background: linear-gradient(135deg, #111 0%, #333 100%);
      color: #fff;
      animation: slideUp 0.5s 0.75s both;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      opacity: 0.6;
      cursor: not-allowed;
      pointer-events: none;
    }
    .btn-tiktok .badge {
      font-size: 0.65rem;
      background: var(--pink);
      color: #fff;
      border-radius: 99px;
      padding: 0.15em 0.55em;
      margin-left: 0.3rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      vertical-align: middle;
    }

    /* Icon area */
    .store-icon {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.22);
      flex-shrink: 0;
      font-size: 1.3rem;
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 2px;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--yellow-light), var(--pink-light), var(--lavender-light), var(--blue-light));
      margin: 1.8rem 0 1.2rem;
    }

    /* Cat emoji row */
    .cats {
      display: flex;
      gap: 0.5rem;
      font-size: 1.4rem;
      animation: slideUp 0.5s 0.85s both;
    }
    .cats span {
      display: inline-block;
      animation: catBounce 2s ease-in-out infinite;
    }
    .cats span:nth-child(2) { animation-delay: 0.2s; }
    .cats span:nth-child(3) { animation-delay: 0.4s; }
    .cats span:nth-child(4) { animation-delay: 0.6s; }
    .cats span:nth-child(5) { animation-delay: 0.8s; }
    @keyframes catBounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }

    /* Footer */
    footer {
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: rgba(80,60,120,0.5);
      font-weight: 700;
      letter-spacing: 0.5px;
      animation: slideUp 0.5s 0.9s both;
    }

    /* Bottom bar */
    .bottom-bar {
      width: 100%;
      max-width: 480px;
      height: 10px;
      border-radius: 99px;
      background: linear-gradient(90deg,
        var(--blue) 0%,
        var(--lavender) 33%,
        var(--pink) 66%,
        var(--yellow) 100%
      );
      margin-top: 2.2rem;
      box-shadow: 0 4px 18px 0 rgba(160,120,200,0.25);
    }
  </style>
</head>
